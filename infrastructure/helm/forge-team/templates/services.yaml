apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
---
{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: minio
    app.kubernetes.io/component: storage
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: gateway
    app.kubernetes.io/component: api
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: dashboard
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: {{ .Values.dashboard.port }}
      protocol: TCP
      name: http
