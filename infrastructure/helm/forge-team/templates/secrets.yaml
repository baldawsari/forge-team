apiVersion: v1
kind: Secret
metadata:
  name: {{ include "forge-team.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  GOOGLE_AI_API_KEY: {{ .Values.secrets.googleAiApiKey | quote }}
  ELEVENLABS_API_KEY: {{ .Values.secrets.elevenlabsApiKey | quote }}
  WHISPER_API_KEY: {{ .Values.secrets.whisperApiKey | quote }}
  POSTGRES_USER: {{ .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgresDb | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | quote }}
