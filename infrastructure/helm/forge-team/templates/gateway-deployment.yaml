apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "forge-team.labels" . | nindent 4 }}
    app: gateway
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gateway
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "forge-team.fullname" . }}-config
            - secretRef:
                name: {{ include "forge-team.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: {{ .Values.gateway.resources.requests.memory }}
              cpu: {{ .Values.gateway.resources.requests.cpu }}
            limits:
              memory: {{ .Values.gateway.resources.limits.memory }}
              cpu: {{ .Values.gateway.resources.limits.cpu }}
