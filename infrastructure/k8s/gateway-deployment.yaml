apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: forgeteam
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        app.kubernetes.io/name: gateway
        app.kubernetes.io/component: api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gateway
      containers:
        - name: gateway
          image: forgeteam/gateway:latest
          ports:
            - containerPort: 18789
              name: http
          envFrom:
            - configMapRef:
                name: forgeteam-config
            - secretRef:
                name: forgeteam-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
