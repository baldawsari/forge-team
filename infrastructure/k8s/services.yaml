apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: forgeteam
  labels:
    app: postgres
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: forgeteam
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: forgeteam
  labels:
    app: minio
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: api
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: console
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: forgeteam
  labels:
    app: gateway
    app.kubernetes.io/name: gateway
    app.kubernetes.io/component: api
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 18789
      targetPort: 18789
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: forgeteam
  labels:
    app: dashboard
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
