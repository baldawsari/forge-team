# =============================================================================
# Feature Sprint Pipeline
# =============================================================================
# An agile sprint workflow for developing a single feature through iterative
# delivery cycles. Covers sprint planning, feature design, implementation,
# testing, release, and retrospective.
#
# Phases: 7 sequential phases following the Scrum framework
# Agents: Product Owner, Scrum Master, Architect, UX Designer, Frontend/Backend Devs,
#         QA Architect, DevOps Engineer, Tech Writer
# Approval Gates: Design->Implementation and Testing->Release require human approval
# Model Overrides: Backend implementation uses Claude Opus 4.6 for complex logic
# Estimated Duration: 1-2 week sprint cycle
# =============================================================================

name: Feature Sprint Pipeline
version: "1.0"
description: Sprint-based feature development with iterative delivery cycles

phases:
  # ---------------------------------------------------------------------------
  # Phase 1: Sprint Planning
  # Define the sprint goal, assess technical feasibility, and create the backlog.
  # Sequential steps: PO sets goals, Architect assesses feasibility, SM plans sprint.
  # ---------------------------------------------------------------------------
  - name: sprint_planning
    display_name: "Sprint Planning"
    display_name_ar: "تخطيط السبرنت"
    agents: [product-owner, scrum-master, architect]
    steps:
      - name: define_sprint_goal
        agent: product-owner                  # PO defines what the sprint aims to deliver and success metrics
        action: define_goal
        outputs: [sprint_goal, feature_list, success_metrics]
        approval_required: true               # Human reviews and approves the sprint goal
      - name: technical_feasibility
        agent: architect                      # Architect evaluates technical risks and effort for proposed features
        action: assess_feasibility
        inputs: [feature_list]
        outputs: [feasibility_report, technical_risks, effort_estimates]
        depends_on: [define_sprint_goal]      # Feasibility requires knowing the feature list
      - name: create_sprint_backlog
        agent: scrum-master                   # Scrum Master organizes tasks, assignments, and timeline
        action: plan_sprint
        inputs: [feature_list, feasibility_report, effort_estimates]
        outputs: [sprint_backlog, task_assignments, sprint_timeline]
        depends_on: [technical_feasibility]   # Backlog depends on feasibility and effort data
    checkpoint: true                          # Checkpoint: sprint plan finalized before design begins

  # ---------------------------------------------------------------------------
  # Phase 2: Feature Design
  # Architecture and UX design run in parallel, then reviewed together.
  # ---------------------------------------------------------------------------
  - name: feature_design
    display_name: "Feature Design"
    display_name_ar: "تصميم الميزة"
    agents: [architect, ux-designer]
    steps:
      - name: feature_architecture
        agent: architect                      # Architect designs the technical structure (APIs, schema changes)
        action: design_feature_architecture
        inputs: [sprint_backlog]
        outputs: [feature_architecture, api_changes, schema_changes]
      - name: feature_ux
        agent: ux-designer                    # UX Designer creates wireframes, interactions, and RTL layout
        action: design_feature_ux
        inputs: [sprint_backlog]
        outputs: [feature_wireframes, interaction_specs, rtl_layout]
        parallel: true                        # Runs concurrently with architecture design
      - name: design_review
        agent: architect                      # Architect reviews both architecture and UX for consistency
        action: review_designs
        depends_on: [feature_architecture, feature_ux]  # Waits for both design tracks
        outputs: [design_approval, integration_notes]
        approval_required: true               # Human reviews feature design before implementation begins
    checkpoint: true                          # Checkpoint: design approved before coding starts

  # ---------------------------------------------------------------------------
  # Phase 3: Implementation
  # Backend and frontend built in parallel, then integrated.
  # Backend uses Claude Opus for complex feature logic and data migrations.
  # ---------------------------------------------------------------------------
  - name: implementation
    display_name: "Implementation"
    display_name_ar: "التنفيذ"
    agents: [frontend-dev, backend-dev]
    steps:
      - name: backend_features
        agent: backend-dev                    # Backend Dev implements APIs, schema changes, and migrations
        model_override: claude-opus-4.6       # Uses Claude Opus for complex backend logic (API design, data migrations)
        action: implement_backend_features
        inputs: [api_changes, schema_changes]
        outputs: [backend_feature_code, api_updates, db_migrations]
        parallel: true                        # Runs concurrently with frontend implementation
      - name: frontend_features
        agent: frontend-dev                   # Frontend Dev builds UI components from wireframes
        action: implement_frontend_features
        inputs: [feature_wireframes, interaction_specs]
        outputs: [frontend_feature_code, component_updates]
        parallel: true                        # Runs concurrently with backend implementation
      - name: feature_integration
        agent: backend-dev                    # Backend Dev integrates frontend and backend, runs integration tests
        action: integrate_features
        depends_on: [backend_features, frontend_features]  # Waits for both parallel tracks to complete
        outputs: [integrated_code, integration_test_results]
    checkpoint: true                          # Checkpoint: integration verified before testing

  # ---------------------------------------------------------------------------
  # Phase 4: Sprint Testing
  # Feature tests, regression suite, and acceptance tests run sequentially.
  # Human approves acceptance results before release.
  # ---------------------------------------------------------------------------
  - name: sprint_testing
    display_name: "Sprint Testing"
    display_name_ar: "اختبار السبرنت"
    agents: [qa-architect]
    steps:
      - name: feature_testing
        agent: qa-architect                   # QA Architect tests the new feature against sprint backlog requirements
        action: test_features
        inputs: [integrated_code, sprint_backlog]
        outputs: [feature_test_results, bug_list]
      - name: regression_testing
        agent: qa-architect                   # QA Architect runs the full regression suite to catch side effects
        action: run_regression_suite
        inputs: [integrated_code]
        outputs: [regression_results, coverage_report]
        depends_on: [feature_testing]         # Regression runs after feature-specific tests pass
      - name: acceptance_testing
        agent: qa-architect                   # QA Architect validates against acceptance criteria from sprint backlog
        action: run_acceptance_tests
        inputs: [sprint_backlog, integrated_code]
        outputs: [acceptance_results, sprint_completion_status]
        depends_on: [regression_testing]      # Acceptance runs after regression is clean
        approval_required: true               # Human reviews acceptance results before release
    checkpoint: true                          # Checkpoint: all tests pass before release

  # ---------------------------------------------------------------------------
  # Phase 5: Sprint Release
  # Prepare the release package, update docs, and deploy.
  # Release prep and documentation run in parallel.
  # ---------------------------------------------------------------------------
  - name: sprint_release
    display_name: "Sprint Release"
    display_name_ar: "إصدار السبرنت"
    agents: [devops-engineer, tech-writer]
    steps:
      - name: prepare_release
        agent: devops-engineer                # DevOps Engineer builds the release package and drafts release notes
        action: prepare_release
        inputs: [integrated_code, acceptance_results]
        outputs: [release_package, release_notes_draft]
      - name: update_docs
        agent: tech-writer                    # Tech Writer updates documentation and changelog for the new feature
        action: update_documentation
        inputs: [sprint_backlog, api_updates]
        outputs: [updated_docs, changelog]
        parallel: true                        # Runs concurrently with release preparation
      - name: deploy_release
        agent: devops-engineer                # DevOps Engineer deploys the sprint release to production
        action: deploy_sprint_release
        depends_on: [prepare_release, update_docs]  # Waits for release package and documentation
        outputs: [deployment_url, monitoring_dashboard]
        approval_required: true               # Human approves production deployment
    checkpoint: true                          # Checkpoint: release deployed and monitored

  # ---------------------------------------------------------------------------
  # Phase 6: Sprint Review & Retrospective
  # Demo the feature, run a retrospective, and groom the backlog for next sprint.
  # Sequential steps: demo -> retro -> backlog grooming.
  # ---------------------------------------------------------------------------
  - name: sprint_review
    display_name: "Sprint Review & Retrospective"
    display_name_ar: "مراجعة السبرنت والاستعراض"
    agents: [scrum-master, product-owner]
    steps:
      - name: sprint_demo
        agent: scrum-master                   # Scrum Master prepares and runs the sprint demo
        action: prepare_demo
        inputs: [deployment_url, sprint_backlog]
        outputs: [demo_script, sprint_metrics]
      - name: sprint_retrospective
        agent: scrum-master                   # Scrum Master facilitates the team retrospective
        action: run_retrospective
        inputs: [sprint_metrics]
        outputs: [retrospective_notes, improvement_actions]
        depends_on: [sprint_demo]             # Retro happens after the demo
      - name: backlog_grooming
        agent: product-owner                  # PO grooms the backlog based on retro feedback for next sprint
        action: groom_backlog
        inputs: [retrospective_notes, improvement_actions]
        outputs: [updated_backlog, next_sprint_candidates]
        depends_on: [sprint_retrospective]    # Grooming incorporates retro learnings
    checkpoint: true                          # Checkpoint: sprint cycle complete

# ---------------------------------------------------------------------------
# Phase Transitions
# "auto" transitions proceed without human intervention.
# "requires_approval" transitions pause for human review before continuing.
# ---------------------------------------------------------------------------
transitions:
  sprint_planning -> feature_design: auto               # Design starts automatically after planning
  feature_design -> implementation: requires_approval    # Human reviews design before coding begins
  implementation -> sprint_testing: auto                 # Testing starts automatically after integration
  sprint_testing -> sprint_release: requires_approval    # Human reviews test results before release
  sprint_release -> sprint_review: auto                  # Review starts automatically after deployment
