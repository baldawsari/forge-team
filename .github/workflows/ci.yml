name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: forgeteam
          POSTGRES_PASSWORD: forgeteam_test
          POSTGRES_DB: forgeteam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgeteam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://forgeteam:forgeteam_test@localhost:5432/forgeteam
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      ANTHROPIC_API_KEY: test-key-not-real
      GOOGLE_AI_API_KEY: test-key-not-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize database
        run: |
          PGPASSWORD=forgeteam_test psql -h localhost -U forgeteam -d forgeteam -f infrastructure/init.sql

      - name: Type check
        run: npm run typecheck --if-present

      - name: Run tests
        run: npm test
