services:
  # ----------------------------------------------------------------
  # Gateway API - Central coordination server
  # ----------------------------------------------------------------
  gateway:
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    container_name: forgeteam-gateway
    ports:
      - "${PORT:-18789}:18789"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=18789
      - DATABASE_URL=postgresql://${POSTGRES_USER:-forgeteam}:${POSTGRES_PASSWORD:-forgeteam_secret}@postgres:5432/${POSTGRES_DB:-forgeteam}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-forgeteam_redis_secret}@redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - VERCEL_TOKEN=${VERCEL_TOKEN:-}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - forgeteam
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # Dashboard - Next.js web interface
  # ----------------------------------------------------------------
  dashboard:
    build:
      context: ..
      dockerfile: docker/dashboard.Dockerfile
    container_name: forgeteam-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      # Note: NEXT_PUBLIC_* vars are baked at build time in Next.js static builds.
      # The api.ts and socket.ts code detect the browser and always use http://localhost:18789.
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:18789
      - NEXT_PUBLIC_WS_URL=http://localhost:18789
    restart: unless-stopped
    networks:
      - forgeteam
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ----------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: forgeteam-postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infrastructure/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-forgeteam}
      - POSTGRES_USER=${POSTGRES_USER:-forgeteam}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-forgeteam_secret}
    restart: unless-stopped
    networks:
      - forgeteam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgeteam} -d ${POSTGRES_DB:-forgeteam}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------------
  # Redis - Caching and pub/sub
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: forgeteam-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-forgeteam_redis_secret}
    restart: unless-stopped
    networks:
      - forgeteam
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-forgeteam_redis_secret}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ----------------------------------------------------------------
  # Qdrant - Vector similarity search engine
  # ----------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: forgeteam-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - forgeteam
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrant_data:
    driver: local

networks:
  forgeteam:
    driver: bridge
    name: forgeteam-network
  sandbox:
    driver: bridge
    name: forgeteam-sandbox
    internal: true
